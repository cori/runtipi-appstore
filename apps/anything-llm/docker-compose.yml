version: "3.7"
services:
  anything-llm:
    container_name: anything-llm
    image: ghcr.io/mintplex-labs/anything-llm:latest
    restart: unless-stopped
    ports:
      - 3001:3001
    cap_add:
      - SYS_ADMIN
    volumes:
      - ${STORAGE_LOCATION}:/app/server/storage
      - ${STORAGE_LOCATION}/.env:/app/server/.env
    environment:
      - STORAGE_DIR=/app/server/storage
